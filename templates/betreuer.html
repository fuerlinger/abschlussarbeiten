<h2>Aktive Betreuer</h2>
<table>
    <tr><th style="width:20%">Name</th><th style="width:25%">Email</th><th>Web</th><th style="width:25%">Aktionen</th></tr>
    {% for r in rows %}
    <tr>
        <td>{{ r.name }}</td><td>{{ r.email }}</td><td>{{ r.web }}</td>
        <td>
          <button class="btn" hx-get="/tab/betreuer?edit={{ r.id }}" hx-target="#content">Bearbeiten</button>
	  <button class="btn btn-sec" hx-post="/api/archive/betreuer/{{ r.id }}"  hx-confirm="Betreuer wirklich archivieren?" hx-target="#content">Archivieren</button>
        </td>
    </tr>
    {% endfor %}
</table>
<br>
<div class="form-panel">
    <h3>{% if edit_item %}Bearbeiten{% else %}Neu anlegen{% endif %}</h3>
    <form hx-post="/api/betreuer" hx-target="#content">
        <input type="hidden" name="id" value="{{ edit_item.id if edit_item else '' }}">
        <label>Name</label>
        <input type="text" name="name" value="{{ edit_item.name if edit_item else '' }}" required>
        <label>Email</label>
        <input type="email" name="email" value="{{ edit_item.email if edit_item else '' }}" required>
	<label>Web</label>
        <input type="text" name="web" value="{{ edit_item.web if edit_item else '' }}" >
        <button type="submit" class="btn">Speichern</button>
        {% if edit_item %}<button type="button" class="btn btn-sec" hx-get="/tab/betreuer" hx-target="#content">Abbrechen</button>{% endif %}
    </form>
</div>
