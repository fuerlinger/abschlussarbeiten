<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MNM Abschlussarbeiten-Verwaltung</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.5; color: #333; }
        nav button { font-size: large; padding: 10px 15px; margin-right: 5px; cursor: pointer; border: 1px solid #ccc; background: #eee; }
        nav button.active { background: #fff; border-bottom: 4px solid #0056b3; background: #d4dfed; }
        #content { margin-top: 10px; border: 1px solid #ccc; padding-left: 20px; padding-bottom: 20px; padding-right: 20px; border-radius: 4px; background: #d4dfed; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff;}
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .inactive { color: #888; background-color: #f9f9f9; text-decoration: line-through; }
        .form-panel { width: 600px; background: #dfedd4; border: 1px solid #ccc; padding-left: 15px; padding-right: 15px; margin-bottom: 20px; border-radius: 4px; }
        .form-panel input, .form-panel select, .form-panel textarea { margin-bottom: 10px; padding: 5px; width: 100%; box-sizing: border-box; }
        .form-panel label { display: block; font-weight: bold; margin-bottom: 5px; }
        .inline-checkbox { display: inline-block !important; width: auto !important; margin-right: 10px; }
        .btn { padding: 8px 12px; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 3px; }
        .btn-danger { background: #dc3545; }
        .btn-sec { background: #6c757d; }
	.btn-rest { background: #007500; }
	.btn-mail { background: #e5c100; }
        ul.sortable { list-style-type: none; padding: 0; margin: 0; }
        ul.sortable li { background: #e9ecef; margin: 5px 0; padding: 8px; cursor: grab; border: 1px solid #ccc; }
        .ghost { opacity: 0.4; }
    </style>
</head>
<body>
    <h1>MNM Abschlussarbeiten-Verwaltung</h1>
    {% block content %}{% endblock %}
</body>
</html>
